name: Dashboard Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: qa288/qc2026-dashboard
  DEPLOY_PATH: /opt/qianchuan/qianchuan_openclaw_reporter

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log In To GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Image Tags
        id: meta
        shell: bash
        run: |
          image="${REGISTRY}/${IMAGE_NAME}"
          sha_tag="sha-${GITHUB_SHA::12}"
          echo "image_ref=${image}:${sha_tag}" >> "${GITHUB_OUTPUT}"
          echo "latest_ref=${image}:latest" >> "${GITHUB_OUTPUT}"

      - name: Build And Push Image
        uses: docker/build-push-action@v6
        with:
          context: ./server_payload/qianchuan_openclaw_reporter
          file: ./server_payload/qianchuan_openclaw_reporter/dashboard/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_ref }}
            ${{ steps.meta.outputs.latest_ref }}

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Deploy Secrets
        id: deploy-secrets
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          missing=0
          for name in SERVER_HOST SERVER_USER SERVER_SSH_KEY GHCR_USERNAME GHCR_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "Missing secret: ${name}"
              missing=1
            fi
          done
          if [ "${missing}" -eq 1 ]; then
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "ready=true" >> "${GITHUB_OUTPUT}"

      - name: Prepare SSH Key
        if: ${{ steps.deploy-secrets.outputs.ready == 'true' }}
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' '${{ secrets.SERVER_SSH_KEY }}' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Upload Image Compose File
        if: ${{ steps.deploy-secrets.outputs.ready == 'true' }}
        shell: bash
        run: |
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            server_payload/qianchuan_openclaw_reporter/docker-compose.dashboard.image.yml \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${DEPLOY_PATH}/docker-compose.dashboard.image.yml"

      - name: Deploy On Server
        if: ${{ steps.deploy-secrets.outputs.ready == 'true' }}
        shell: bash
        env:
          IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no "${SERVER_USER}@${SERVER_HOST}" <<EOF
          set -euo pipefail
          cd "${DEPLOY_PATH}"
          echo "${GHCR_TOKEN}" | docker login "${REGISTRY}" -u "${GHCR_USERNAME}" --password-stdin
          export QC_DASHBOARD_IMAGE="${IMAGE_REF}"
          docker-compose -f docker-compose.dashboard.image.yml pull web worker scheduler
          docker-compose -f docker-compose.dashboard.image.yml up -d web worker scheduler
          docker image prune -f >/dev/null 2>&1 || true
          EOF
