verification_sql:
  material_plan_day_diff_non_title: |
    WITH plan_cost AS (
      SELECT customer_center_id, biz_date, ad_id,
             ROUND(SUM(stat_cost)::numeric, 2) AS plan_cost
      FROM plan_daily
      WHERE biz_date BETWEEN :start_date AND :end_date
      GROUP BY customer_center_id, biz_date, ad_id
    ),
    material_cost AS (
      SELECT customer_center_id, biz_date, ad_id,
             ROUND(SUM(CASE WHEN UPPER(COALESCE(material_type, '')) <> 'TITLE'
                            THEN stat_cost ELSE 0 END)::numeric, 2) AS material_cost
      FROM material_relation_daily
      WHERE biz_date BETWEEN :start_date AND :end_date
      GROUP BY customer_center_id, biz_date, ad_id
    )
    SELECT p.customer_center_id, p.biz_date, p.ad_id,
           p.plan_cost, COALESCE(m.material_cost, 0) AS material_cost,
           ROUND((p.plan_cost - COALESCE(m.material_cost, 0))::numeric, 2) AS diff
    FROM plan_cost p
    LEFT JOIN material_cost m USING (customer_center_id, biz_date, ad_id)
    WHERE ABS(p.plan_cost - COALESCE(m.material_cost, 0)) > :threshold_yuan
    ORDER BY p.biz_date, ABS(p.plan_cost - COALESCE(m.material_cost, 0)) DESC;

  material_relation_edge_counts: |
    SELECT customer_center_id, material_key,
           COUNT(DISTINCT advertiser_id) AS advertiser_count,
           COUNT(DISTINCT ad_id) AS plan_count
    FROM material_relation_edges
    WHERE customer_center_id = :customer_center_id
      AND material_key = :material_key
    GROUP BY customer_center_id, material_key;
