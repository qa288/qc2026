services:
  web:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: qianchuan-web
    restart: unless-stopped
    env_file:
      - .env.dashboard
    environment:
      CONFIG_PATH: /app/config/config.json
      DATA_DIR: /app/data
      DATABASE_PATH: /app/data/dashboard.db
      TOKEN_CACHE_PATH: /app/data/token_cache.json
      LATEST_TOKEN_PATH: /app/data/qianchuan_latest_token.json
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
      DATABASE_URL: postgresql://${POSTGRES_USER:-qianchuan}:${POSTGRES_PASSWORD:-qianchuan}@postgres:5432/${POSTGRES_DB:-qianchuan}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ENABLE_IN_PROCESS_SCHEDULER: "0"
    ports:
      - "9898:9898"
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: qianchuan-worker
    restart: unless-stopped
    command: celery -A dashboard.celery_app.celery_app worker -l info
    env_file:
      - .env.dashboard
    environment:
      CONFIG_PATH: /app/config/config.json
      DATA_DIR: /app/data
      DATABASE_PATH: /app/data/dashboard.db
      TOKEN_CACHE_PATH: /app/data/token_cache.json
      LATEST_TOKEN_PATH: /app/data/qianchuan_latest_token.json
      DATABASE_URL: postgresql://${POSTGRES_USER:-qianchuan}:${POSTGRES_PASSWORD:-qianchuan}@postgres:5432/${POSTGRES_DB:-qianchuan}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres
      - redis

  scheduler:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: qianchuan-scheduler
    restart: unless-stopped
    command: celery -A dashboard.celery_app.celery_app beat -l info
    env_file:
      - .env.dashboard
    environment:
      CONFIG_PATH: /app/config/config.json
      DATA_DIR: /app/data
      DATABASE_PATH: /app/data/dashboard.db
      TOKEN_CACHE_PATH: /app/data/token_cache.json
      LATEST_TOKEN_PATH: /app/data/qianchuan_latest_token.json
      DATABASE_URL: postgresql://${POSTGRES_USER:-qianchuan}:${POSTGRES_PASSWORD:-qianchuan}@postgres:5432/${POSTGRES_DB:-qianchuan}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17
    container_name: qianchuan-postgres
    restart: unless-stopped
    env_file:
      - .env.dashboard
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qianchuan}
      POSTGRES_USER: ${POSTGRES_USER:-qianchuan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qianchuan}
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: qianchuan-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ./volumes/redis:/data
